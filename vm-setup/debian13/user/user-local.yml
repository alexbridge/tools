# ansible-playbook setup.yml --ask-become-pass
---
- name: Local user setup
  hosts: localhost
  become: true

  vars:
    current_user: "{{ ansible_env.SUDO_USER }}"
    git_user_name: "O.Bilenko"
    git_user_email: "alexbridge.de@gmail.com"

  tasks:
    # --- git config ---
    - name: Set git user name
      git_config:
        name: user.name
        value: "{{ git_user_name }}"
        scope: global
      become_user: "{{ current_user }}"

    - name: Set git user email
      git_config:
        name: user.email
        value: "{{ git_user_email }}"
        scope: global
      become_user: "{{ current_user }}"

    - name: Set git default branch to main
      git_config:
        name: init.defaultBranch
        value: main
        scope: global
      become_user: "{{ current_user }}"

    # --- bashrc: interactive guard at top ---
    - name: Ensure interactive guard at top of .bashrc
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - interactive guard"
        insertbefore: BOF
        block: |
          # Exit early if shell is non-interactive
          case $- in
            *i*) ;;
            *) return;;
          esac
      become_user: "{{ current_user }}"

    # --- bashrc: dbus-launch ---
    - name: Configure dbus-launch in .bashrc
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - dbus-launch"
        insertafter: "# END ANSIBLE MANAGED BLOCK - interactive guard"
        block: |
          export $(dbus-launch)
      become_user: "{{ current_user }}"

    # --- bashrc: color prompt and aliases ---
    - name: Configure color prompt and aliases in .bashrc
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - shell aliases"
        block: |
          # Enable color prompt
          force_color_prompt=yes

          if [ "$force_color_prompt" = yes ]; then
              PS1='\[\033[01;32m\]\u@\h\[\033[00m\]:\[\033[01;34m\]\w\[\033[00m\]\$ '
          fi

          # Colored output aliases
          alias ls='ls --color=auto'
          alias grep='grep --color=auto'
          alias fgrep='fgrep --color=auto'
          alias egrep='egrep --color=auto'
          alias ll='ls -lah'
          alias la='ls -A'
          alias l='ls -CF'
      become_user: "{{ current_user }}"

    # --- bashrc: history settings ---
    - name: Configure bash history settings in .bashrc
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - history"
        block: |
          # Avoid duplicate or space-prefixed lines in history
          HISTCONTROL=ignoreboth
          HISTSIZE=10000
          HISTFILESIZE=2000
          shopt -s histappend
          shopt -s checkwinsize
      become_user: "{{ current_user }}"

    # --- bashrc: git branch in prompt ---
    - name: Show git branch in prompt
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - git prompt"
        block: |
          parse_git_branch() {
            git branch 2> /dev/null | sed -e '/^[^*]/d' -e 's/* \(.*\)/(\1)/'
          }
          export PS1="$PS1\[\e[91m\]\$(parse_git_branch)\[\e[00m\]$ "
          PROMPT_DIRTRIM=1
      become_user: "{{ current_user }}"

    # --- bashrc: local.history function ---
    - name: Add local.history shell function to .bashrc
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - local.history"
        block: |
          # Runs in current shell so cd works; overwrites alias from .mmake_aliases
          local_history() {
            history | sort --unique > ~/.local_history2
            mv ~/.local_history2 ~/.local_history
            local selected
            selected=$(sort --unique ~/.local_history <(cat ~/.bash_history 2>/dev/null) | fzf --no-sort --exact)
            [ -n "$selected" ] && echo "$selected" | xclip -selection clipboard && eval "$selected"
          }
      become_user: "{{ current_user }}"

    # --- bashrc: bash completion ---
    - name: Configure bash completion in .bashrc
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - bash completion"
        block: |
          # enable programmable completion features
          if ! shopt -oq posix; then
            if [ -f /usr/share/bash-completion/bash_completion ]; then
              . /usr/share/bash-completion/bash_completion
            elif [ -f /etc/bash_completion ]; then
              . /etc/bash_completion
            fi
          fi
      become_user: "{{ current_user }}"

    # --- bashrc: navigation aliases ---
    - name: Configure navigation aliases in .bashrc
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - navigation aliases"
        block: |
          alias ...="cd /home/projects"
          alias clip='xclip -sel clip'
          alias work='code ~/Work/Work.code-workspace'
          alias tools='code /home/projects/github/tools'
          alias ggemini='cd ~/.gemini && gemini'

          # fzf (fuzzy finder) navigation: jump to git repos under /home/projects
          has_dot_git() {
            while read -r line; do
              [[ -d "${line}/.git" ]] && echo "$line" && continue;
              [[ -d "${line}/../.git" ]] && echo "$line" && continue;
              [[ -d "${line}/../../.git" ]] && echo "$line";
            done;
          }
          alias cdd='cd /home/projects; f=$(find . -maxdepth 3 -type d -not -path "." | has_dot_git | fzf); [[ -n "${f}" ]] && cd "$(pwd)/${f}"'
      become_user: "{{ current_user }}"

    # --- bashrc: misc exports ---
    - name: Configure misc exports in .bashrc
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - exports"
        block: |
          export FZF_DEFAULT_OPTS='--height 50% --layout=reverse --border --exact'
          export LIBGL_ALWAYS_SOFTWARE=1
          export GDK_BACKEND=x11
          export DONT_PROMPT_WSL_INSTALL=1
      become_user: "{{ current_user }}"
