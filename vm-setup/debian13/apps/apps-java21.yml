# ansible-playbook apps/apps-java21.yml --ask-become-pass
---
- name: Java 21 Temurin setup
  hosts: localhost
  become: true

  vars:
    current_user: "{{ ansible_env.SUDO_USER }}"
    java_home: "/usr/lib/jvm/temurin-21-amd64"

  tasks:
    - name: Remove stale Adoptium apt list if malformed
      file:
        path: /etc/apt/sources.list.d/adoptium.list
        state: absent

    - name: Install apt dependencies
      apt:
        name: [wget, gpg]
        state: present

    - name: Add Adoptium GPG key
      shell: |
        wget -qO- https://packages.adoptium.net/artifactory/api/gpg/key/public \
        | gpg --dearmor > /usr/share/keyrings/adoptium.gpg
      args:
        creates: /usr/share/keyrings/adoptium.gpg

    - name: Add Adoptium apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb bookworm main"
        filename: adoptium
        state: present

    - name: Install Temurin 21
      apt:
        name: temurin-21-jdk
        state: present
        update_cache: true

    - name: Set JAVA_HOME in .bashrc
      become_user: "{{ current_user }}"
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED - java21"
        block: |
          export JAVA_HOME="{{ java_home }}"
          export PATH="$JAVA_HOME/bin:$PATH"
