# ansible-playbook apps-docker.yml --ask-become-pass
---
- name: Docker setup
  hosts: localhost
  become: true

  vars:
    current_user: "{{ ansible_env.SUDO_USER }}"

  tasks:
    # --- remove old distro packages (including standalone buildx/compose) ---
    - name: Remove old docker packages
      apt:
        name:
          - docker.io
          - docker-compose
          - docker-doc
          - podman-docker
          - docker-buildx
          - containerd
        state: absent
        purge: true

    # --- fix any broken dpkg state from previous installs ---
    - name: Fix broken dpkg state
      command: dpkg --configure -a

    - name: Fix broken apt dependencies
      apt:
        state: fixed

    # --- prerequisites ---
    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true

    # --- Docker GPG key ---
    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    # --- Docker apt repo ---
    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian trixie stable"
        filename: docker
        state: present

    # --- install docker-ce + plugins ---
    - name: Install docker-ce and plugins
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    # --- current user: docker group ---
    - name: Add current user to docker group
      user:
        name: "{{ current_user }}"
        groups:
          - docker
        append: true

    # --- docker service ---
    - name: Enable and start docker
      systemd:
        name: docker
        enabled: true
        state: started
