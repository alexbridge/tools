# ansible-playbook setup.yml --ask-become-pass
---
- name: Debian base setup
  hosts: localhost
  become: true

  vars:
    current_user: "{{ ansible_user_id }}"
    git_user_name: "O.Bilenko"
    git_user_email: "alexbridge.de@gmail.com"

  tasks:
    - name: Remove conflicting vscode repo if exists
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/vscode.list
        - /etc/apt/sources.list.d/vscode.sources
        - /usr/share/keyrings/microsoft.gpg
        - /etc/apt/keyrings/microsoft.gpg

    # --- packages ---
    - name: Install base packages
      apt:
        name:
          - docker.io
          - tree
          - curl
          - rsync
          - git
          - wget
          - gpg
        state: present
        update_cache: true

    # --- git config ---
    - name: Set git user name
      git_config:
        name: user.name
        value: "{{ git_user_name }}"
        scope: global
      become_user: "{{ current_user }}"

    - name: Set git user email
      git_config:
        name: user.email
        value: "{{ git_user_email }}"
        scope: global
      become_user: "{{ current_user }}"

    - name: Set git default branch to main
      git_config:
        name: init.defaultBranch
        value: main
        scope: global
      become_user: "{{ current_user }}"

    # --- group: projects ---
    - name: Create group projects
      group:
        name: projects
        state: present

    # --- user: projects ---
    - name: Create user projects
      user:
        name: projects
        group: projects
        home: /home/projects
        shell: /bin/bash
        create_home: true
        state: present

    # --- current user: groups ---
    - name: Add current user to sudo, docker, projects
      user:
        name: "{{ current_user }}"
        groups:
          - sudo
          - docker
          - projects
        append: true

    # --- docker service ---
    - name: Enable and start docker
      systemd:
        name: docker
        enabled: true
        state: started
     # --- vscode: microsoft repo ---
    - name: Install vscode apt dependencies
      apt:
        name:
          - wget
          - gpg
        state: present

    - name: Add Microsoft GPG key
      shell: |
        wget -qO- https://packages.microsoft.com/keys/microsoft.asc \
        | gpg --dearmor > /usr/share/keyrings/microsoft.gpg
      args:
        creates: /usr/share/keyrings/microsoft.gpg

    - name: Add vscode apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main"
        filename: vscode
        state: present

    - name: Install vscode
      apt:
        name: code
        state: present
        update_cache: true
